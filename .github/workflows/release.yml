name: release

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  GORELEASER_VERSION: 'v2.17.0'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 1. release-please opens/updates a release PR from Conventional Commits, and
  #    cuts the tag + GitHub release + CHANGELOG when that PR is merged.
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Uses a PAT (RELEASE_PLEASE_TOKEN) when available so the release PR
      # triggers CI; falls back to the built-in GITHUB_TOKEN otherwise.
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # 2. On a real release, build and publish artifacts and append them to the
  #    GitHub release release-please created.
  goreleaser:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload release artifacts
      packages: write # push images to ghcr.io
      id-token: write # sign provenance with Sigstore
      attestations: write # publish provenance to GitHub
    # Mirror the optional Docker Hub secrets into env so steps can gate on their
    # presence (secrets can't be referenced from a step-level `if:` directly).
    # goreleaser also reads DOCKERHUB_TOKEN to decide whether to push docker.io.
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: install Syft for release SBOMs
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.48.0
      - name: install cosign for keyless signing
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: log in to Docker Hub
        # Skipped when the Docker Hub secrets are unset, so a release still
        # succeeds (goreleaser then only pushes to GHCR).
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional publishers — skipped by .goreleaser.yaml when unset.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
      - name: attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-checksums: dist/checksums.txt
      # SBOM for the pushed container image, attached to it as a keyless cosign
      # attestation (`cosign verify-attestation --type spdxjson`). Targets the
      # GHCR manifest (always pushed); Docker Hub is an optional mirror.
      - name: attest SBOM for the container image
        env:
          IMAGE: ghcr.io/sergiught/openfga-cli
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          tag="${TAG_NAME#v}"
          digest="$(docker buildx imagetools inspect "${IMAGE}:${tag}" --format '{{ .Manifest.Digest }}')"
          syft "${IMAGE}@${digest}" -o spdx-json=image.sbom.spdx.json
          cosign attest --yes --type spdxjson \
            --predicate image.sbom.spdx.json "${IMAGE}@${digest}"
      # Sync the Docker Hub repository description/README — goreleaser can't do
      # this. Gated on the Docker Hub credentials, like the login/push above, so
      # a fork or a Docker-Hub-less release skips it cleanly.
      - name: update Docker Hub description
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
          repository: sergiught/openfga-cli
          short-description: "A modern CLI & TUI for OpenFGA."
          readme-filepath: ./docs/docker/README.md
