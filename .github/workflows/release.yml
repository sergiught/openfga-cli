name: release

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: '1.26'
  GORELEASER_VERSION: 'v2.4.5'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 1. release-please opens/updates a release PR from Conventional Commits, and
  #    cuts the tag + GitHub release + CHANGELOG when that PR is merged.
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Uses a PAT (RELEASE_PLEASE_TOKEN) when available so the release PR
      # triggers CI; falls back to the built-in GITHUB_TOKEN otherwise.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # 2. On a real release, build and publish artifacts and append them to the
  #    GitHub release release-please created.
  goreleaser:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload release artifacts
      packages: write # push images to ghcr.io
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional publishers — skipped by .goreleaser.yaml when unset.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
