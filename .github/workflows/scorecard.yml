name: scorecard

# OpenSSF Scorecard — supply-chain security posture scoring.
# Results publish to the public OpenSSF API (securityscorecards.dev) and
# surface in the repo Security tab.

on:
  branch_protection_rule:
  schedule:
    - cron: '0 7 * * 1' # weekly Monday
  workflow_dispatch:
  push:
    branches: [main]

# Top-level least privilege; write scopes are granted only to the job below.
permissions: read-all

concurrency:
  group: scorecard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analysis:
    name: scorecard analysis
    # Dormant while the repo is private: Scorecard's publish + badge API only
    # work on public repos. The gate opens automatically on the flip to public
    # — no edit needed. For push/schedule/workflow_dispatch/branch_protection
    # events the repository payload carries the current visibility.
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write   # upload SARIF to code scanning
      id-token: write          # publish results to the OpenSSF API (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: run scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
          # PAT with admin:read so the Branch-Protection check can read the
          # rules on main (the default GITHUB_TOKEN can't). Falls back
          # gracefully if the secret is unset.
          repo_token: ${{ secrets.SCORECARD_TOKEN }}
      - name: upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 14
      - name: upload sarif to code scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
