name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: verify formatting
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go' | grep -v '^vendor/'))
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: verify modules are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      # The profiles e2e tests run the real binary, which stores secrets in the
      # OS keyring and refuses to fall back to plaintext. Headless runners have
      # no Secret Service, so provide gnome-keyring under a private D-Bus session.
      - name: install gnome-keyring for secret-store e2e tests
        run: sudo apt-get update && sudo apt-get install -y gnome-keyring
      - name: test
        # OFGA_E2E_REQUIRE_KEYRING makes the keyring-backed e2e tests fail loudly
        # if this provisioned keyring ever stops working, rather than skipping.
        env:
          OFGA_E2E_REQUIRE_KEYRING: '1'
        run: |
          dbus-run-session -- bash -c '
            echo "" | gnome-keyring-daemon --unlock --components=secrets >/dev/null 2>&1
            go test -race ./...
          '

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.12.2

  vulnerability-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: run govulncheck
        run: make vuln
